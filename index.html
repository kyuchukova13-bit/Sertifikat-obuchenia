<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Генератор на Сертификати</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    
   <style>
    /* Центриране и премахване на излишното бяло място */
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #2c2c2c; 
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        /* Важно: Принуждава браузъра да печата графиките */
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }

    .admin-panel {
        background: white; 
        padding: 15px; 
        border-radius: 10px; 
        margin-bottom: 20px;
        display: flex; 
        gap: 15px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        z-index: 100;
    }

    /* Контейнерът на сертификата */
    #certificate-print-area {
        width: 1123px; /* A4 Landscape */
        height: 794px;
        position: relative;
        background-color: white;
        overflow: hidden;
    }

    /* Темплейтът като вградена картинка */
    .bg-template {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1; /* Най-отдолу */
        object-fit: contain;
    }

    /* Името, разположено над картинката */
    .name-overlay {
        position: absolute;
        top: 51%; /* Регулирайте тук за височината */
        left: 50%;
        transform: translate(-50%, -50%);
        width: 85%;
        text-align: center;
        font-family: 'Great Vibes', cursive;
        font-size: 100px;
        color: #1a3a5a;
        white-space: nowrap;
        z-index: 2; /* Над картинката */
    }

    input { padding: 10px; width: 300px; border: 1px solid #003366; border-radius: 5px; }
    button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; background: #27ae60; color: white; }

    @media print {
        .admin-panel { display: none !important; }
        body { background: white !important; }
        #certificate-print-area { box-shadow: none !important; margin: 0 !important; }
    }
</style>

<body>
    <div class="admin-panel">
        <input type="text" id="nameInput" placeholder="Име Фамилия..." oninput="document.getElementById('display-name').innerText = this.value || 'Име Фамилия'">
        <button onclick="window.print()">🖨️ ЗАПАЗИ КАТО PDF / ПЕЧАТ</button>
    </div>

    <div id="certificate-print-area">
        <img src="https://raw.githubusercontent.com/kyuchukova13-bit/Sertifikat-obuchenia/main/%D0%A1%D0%B5%D1%80%D1%82%D0%B8%D1%84%D0%B8%D0%BA%D0%B0%D1%82.png" 
             class="bg-template" alt="Certificate">
        
        <div id="display-name" class="name-overlay">Име Фамилия</div>
    </div>
</body>
</head>
<body>

</html>
